<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSE Demo</title>
    <style>
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        background: #f5f7fb;
        color: #172033;
      }

      main {
        max-width: 880px;
        margin: 0 auto;
        padding: 32px 20px;
      }

      h1 {
        margin: 0 0 16px;
        font-size: 28px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 16px;
      }

      section {
        margin-top: 24px;
      }

      h2 {
        margin: 0 0 12px;
        font-size: 18px;
      }

      button,
      input {
        height: 38px;
        border: 1px solid #c9d2e3;
        border-radius: 6px;
        font: inherit;
      }

      button {
        padding: 0 14px;
        background: #175cd3;
        color: white;
        cursor: pointer;
      }

      button.secondary {
        background: white;
        color: #172033;
      }

      input {
        min-width: 240px;
        padding: 0 10px;
      }

      .status {
        margin-bottom: 16px;
        color: #475467;
      }

      pre {
        min-height: 360px;
        margin: 0;
        padding: 16px;
        overflow: auto;
        border: 1px solid #d8dee9;
        border-radius: 8px;
        background: #101828;
        color: #d1fadf;
      }

      .stream-log {
        min-height: 240px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>SSE Demo</h1>
      <section>
        <h2>EventSource SSE</h2>
        <div class="toolbar">
          <button id="connect">Connect</button>
          <button id="close" class="secondary">Close</button>
          <input id="message" value="hello from browser" />
          <button id="send">Broadcast</button>
        </div>
        <div id="status" class="status">Disconnected</div>
        <pre id="log"></pre>
      </section>

      <section>
        <h2>Fetch ReadableStream</h2>
        <div class="toolbar">
          <input id="stream-prompt" value="stream this response from fetch" />
          <button id="fetch-stream">Start stream</button>
          <button id="cancel-fetch-stream" class="secondary">Cancel</button>
        </div>
        <div id="fetch-status" class="status">Idle</div>
        <pre id="fetch-log" class="stream-log"></pre>
      </section>
    </main>

    <script src="/public/main.js"></script>
  </body>
</html>
