<svg xmlns="http://www.w3.org/2000/svg" width="920" height="330" viewBox="0 0 920 330" role="img" aria-labelledby="title desc">
  <title id="title">DataView protocol parsing</title>
  <desc id="desc">A diagram showing DataView reading a binary protocol with fields of different types at exact byte offsets.</desc>
  <rect width="920" height="330" fill="#f8fafc"/>
  <text x="40" y="44" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">DataView：按字节偏移解析混合结构</text>
  <text x="40" y="76" font-family="Arial, sans-serif" font-size="15" fill="#334155">适合读文件头、二进制协议、模型格式这类“每段含义不同”的数据。</text>
  <g transform="translate(58,120)" font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="0" y="0" width="100" height="70" fill="#dbeafe" stroke="#2563eb"/>
    <text x="50" y="28" font-size="14" font-weight="700" fill="#1e3a8a">magic</text>
    <text x="50" y="50" font-size="12" fill="#1e40af">Uint32 @0</text>
    <rect x="100" y="0" width="100" height="70" fill="#dcfce7" stroke="#16a34a"/>
    <text x="150" y="28" font-size="14" font-weight="700" fill="#166534">version</text>
    <text x="150" y="50" font-size="12" fill="#166534">Uint16 @4</text>
    <rect x="200" y="0" width="150" height="70" fill="#fef3c7" stroke="#d97706"/>
    <text x="275" y="28" font-size="14" font-weight="700" fill="#92400e">position.x</text>
    <text x="275" y="50" font-size="12" fill="#92400e">Float32 @6</text>
    <rect x="350" y="0" width="150" height="70" fill="#fef3c7" stroke="#d97706"/>
    <text x="425" y="28" font-size="14" font-weight="700" fill="#92400e">position.y</text>
    <text x="425" y="50" font-size="12" fill="#92400e">Float32 @10</text>
    <rect x="500" y="0" width="150" height="70" fill="#fef3c7" stroke="#d97706"/>
    <text x="575" y="28" font-size="14" font-weight="700" fill="#92400e">position.z</text>
    <text x="575" y="50" font-size="12" fill="#92400e">Float32 @14</text>
    <rect x="650" y="0" width="180" height="70" fill="#fee2e2" stroke="#dc2626"/>
    <text x="740" y="28" font-size="14" font-weight="700" fill="#991b1b">payload</text>
    <text x="740" y="50" font-size="12" fill="#991b1b">bytes @18...</text>
  </g>
  <text x="58" y="244" font-family="Arial, sans-serif" font-size="15" fill="#334155">示例：view.getUint32(0, true)、view.getFloat32(6, true)。第二个参数控制大小端。</text>
</svg>
