<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">JavaScript binary data overview</title>
  <desc id="desc">A diagram showing ArrayBuffer as raw memory, TypedArray and DataView as views, and common consumers such as WebGL, Canvas, files, network and WebAssembly.</desc>
  <rect width="920" height="360" fill="#f8fafc"/>
  <text x="40" y="48" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#0f172a">前端二进制数据关系</text>
  <rect x="64" y="118" width="300" height="86" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="214" y="151" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1e3a8a">ArrayBuffer</text>
  <text x="214" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1e40af">一块原始连续内存</text>
  <path d="M365 160 H455" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="456" y="76" width="178" height="64" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="545" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#166534">TypedArray</text>
  <text x="545" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#166534">按固定类型读取</text>
  <rect x="456" y="180" width="178" height="64" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="545" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#92400e">DataView</text>
  <text x="545" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#92400e">按偏移读不同类型</text>
  <path d="M635 108 H720" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M635 212 H720" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="720" y="50" width="150" height="42" rx="6" fill="#fff" stroke="#94a3b8"/>
  <text x="795" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0f172a">WebGL / GPU</text>
  <rect x="720" y="104" width="150" height="42" rx="6" fill="#fff" stroke="#94a3b8"/>
  <text x="795" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0f172a">Canvas 像素</text>
  <rect x="720" y="158" width="150" height="42" rx="6" fill="#fff" stroke="#94a3b8"/>
  <text x="795" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0f172a">网络 / 文件</text>
  <rect x="720" y="212" width="150" height="42" rx="6" fill="#fff" stroke="#94a3b8"/>
  <text x="795" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0f172a">音视频</text>
  <rect x="720" y="266" width="150" height="42" rx="6" fill="#fff" stroke="#94a3b8"/>
  <text x="795" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0f172a">WebAssembly</text>
  <text x="64" y="280" font-family="Arial, sans-serif" font-size="15" fill="#334155">核心理解：ArrayBuffer 只负责存字节；TypedArray 和 DataView 负责解释这些字节。</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
