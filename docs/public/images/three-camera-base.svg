<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" role="img" aria-label="Camera 基类示意图">
  <rect width="820" height="300" rx="8" fill="#171717"/>
  <g font-family="Arial, sans-serif">
    <text x="40" y="44" fill="#f5f5f5" font-size="24" font-weight="700">Camera：相机基类</text>
    <text x="40" y="72" fill="#a1a1aa" font-size="15">Camera 提供位置、方向、矩阵等基础能力；实际渲染通常使用它的子类。</text>
    <rect x="78" y="116" width="180" height="96" rx="10" fill="#202020" stroke="#52525b"/>
    <text x="168" y="154" text-anchor="middle" fill="#f5f5f5" font-size="20" font-weight="700">Camera</text>
    <text x="168" y="184" text-anchor="middle" fill="#a1a1aa" font-size="13">position / matrix</text>
    <line x1="258" y1="164" x2="354" y2="120" stroke="#60a5fa" stroke-width="3"/>
    <line x1="258" y1="164" x2="354" y2="208" stroke="#60a5fa" stroke-width="3"/>
    <rect x="354" y="74" width="180" height="78" rx="10" fill="#1f2937" stroke="#60a5fa"/>
    <text x="444" y="106" text-anchor="middle" fill="#f5f5f5" font-size="18" font-weight="700">PerspectiveCamera</text>
    <text x="444" y="132" text-anchor="middle" fill="#d4d4d8" font-size="13">透视投影</text>
    <rect x="354" y="176" width="180" height="78" rx="10" fill="#1f2937" stroke="#60a5fa"/>
    <text x="444" y="208" text-anchor="middle" fill="#f5f5f5" font-size="18" font-weight="700">OrthographicCamera</text>
    <text x="444" y="234" text-anchor="middle" fill="#d4d4d8" font-size="13">正交投影</text>
    <rect x="594" y="116" width="150" height="96" rx="10" fill="#202020" stroke="#52525b"/>
    <text x="669" y="154" text-anchor="middle" fill="#f5f5f5" font-size="18" font-weight="700">特殊相机</text>
    <text x="669" y="181" text-anchor="middle" fill="#a1a1aa" font-size="13">Cube / Stereo</text>
  </g>
</svg>
