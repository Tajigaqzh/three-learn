<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">ImageData pixel buffer</title>
  <desc id="desc">A diagram showing Canvas ImageData as a Uint8ClampedArray of RGBA pixel values.</desc>
  <rect width="920" height="360" fill="#f8fafc"/>
  <text x="40" y="44" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Uint8ClampedArray：Canvas 像素数据</text>
  <text x="40" y="76" font-family="Arial, sans-serif" font-size="15" fill="#334155">Canvas 的 ImageData.data 是 RGBA 一维数组，每个通道都是 0-255。</text>
  <g transform="translate(74,118)">
    <rect x="0" y="0" width="156" height="156" fill="#fff" stroke="#334155" stroke-width="2"/>
    <rect x="12" y="12" width="60" height="60" fill="#ef4444"/>
    <rect x="84" y="12" width="60" height="60" fill="#22c55e"/>
    <rect x="12" y="84" width="60" height="60" fill="#3b82f6"/>
    <rect x="84" y="84" width="60" height="60" fill="#facc15"/>
    <text x="78" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">2 x 2 像素</text>
  </g>
  <path d="M270 190 H350" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <g transform="translate(370,116)" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">
    <rect x="0" y="0" width="104" height="50" fill="#fee2e2" stroke="#ef4444"/>
    <text x="52" y="30" fill="#991b1b">R G B A</text>
    <rect x="104" y="0" width="104" height="50" fill="#dcfce7" stroke="#22c55e"/>
    <text x="156" y="30" fill="#166534">R G B A</text>
    <rect x="208" y="0" width="104" height="50" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="260" y="30" fill="#1e3a8a">R G B A</text>
    <rect x="312" y="0" width="104" height="50" fill="#fef3c7" stroke="#eab308"/>
    <text x="364" y="30" fill="#92400e">R G B A</text>
    <text x="208" y="92" font-size="15" fill="#334155">Uint8ClampedArray 长度 = width * height * 4</text>
  </g>
  <text x="370" y="256" font-family="Arial, sans-serif" font-size="15" fill="#334155">Clamped 的意思是：写入 -10 会变成 0，写入 300 会变成 255。</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
