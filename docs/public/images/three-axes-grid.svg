<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" role="img" aria-label="Three.js 三维坐标轴和网格辅助线">
  <rect width="920" height="420" rx="8" fill="#171717"/>
  <defs>
    <marker id="axisArrowX" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#ef4444"/>
    </marker>
    <marker id="axisArrowY" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#22c55e"/>
    </marker>
    <marker id="axisArrowZ" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#3b82f6"/>
    </marker>
  </defs>
  <g font-family="Arial, sans-serif">
    <text x="40" y="44" fill="#f5f5f5" font-size="24" font-weight="700">三维坐标轴与 GridHelper</text>
    <text x="40" y="72" fill="#a1a1aa" font-size="15">红色 X、绿色 Y、蓝色 Z；网格线帮助判断空间位置和地面方向。</text>

    <g transform="translate(250 260)">
      <g stroke="#52525b" stroke-width="1.5">
        <line x1="-160" y1="-80" x2="160" y2="-80"/>
        <line x1="-180" y1="-40" x2="140" y2="-40"/>
        <line x1="-200" y1="0" x2="120" y2="0"/>
        <line x1="-220" y1="40" x2="100" y2="40"/>
        <line x1="-240" y1="80" x2="80" y2="80"/>
        <line x1="-160" y1="-80" x2="-240" y2="80"/>
        <line x1="-80" y1="-80" x2="-160" y2="80"/>
        <line x1="0" y1="-80" x2="-80" y2="80"/>
        <line x1="80" y1="-80" x2="0" y2="80"/>
        <line x1="160" y1="-80" x2="80" y2="80"/>
      </g>

      <line x1="0" y1="0" x2="180" y2="0" stroke="#ef4444" stroke-width="5" marker-end="url(#axisArrowX)"/>
      <line x1="0" y1="0" x2="0" y2="-160" stroke="#22c55e" stroke-width="5" marker-end="url(#axisArrowY)"/>
      <line x1="0" y1="0" x2="-120" y2="100" stroke="#3b82f6" stroke-width="5" marker-end="url(#axisArrowZ)"/>

      <text x="190" y="6" fill="#ef4444" font-size="18" font-weight="700">X</text>
      <text x="10" y="-166" fill="#22c55e" font-size="18" font-weight="700">Y</text>
      <text x="-148" y="118" fill="#3b82f6" font-size="18" font-weight="700">Z</text>
    </g>

    <rect x="610" y="126" width="238" height="190" rx="10" fill="#202020" stroke="#3f3f46"/>
    <text x="636" y="162" fill="#f5f5f5" font-size="18" font-weight="700">辅助对象</text>
    <text x="636" y="198" fill="#d4d4d8" font-size="14">AxesHelper(50)</text>
    <text x="636" y="224" fill="#a1a1aa" font-size="13">显示 x / y / z 方向</text>
    <text x="636" y="260" fill="#d4d4d8" font-size="14">GridHelper(100, 20)</text>
    <text x="636" y="286" fill="#a1a1aa" font-size="13">显示地面参考网格</text>
  </g>
</svg>
