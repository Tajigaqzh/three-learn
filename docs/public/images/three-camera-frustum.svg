<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 430" role="img" aria-label="PerspectiveCamera 参数示意图">
  <rect width="920" height="430" rx="8" fill="#171717"/>
  <defs>
    <marker id="cameraArrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#60a5fa"/>
    </marker>
  </defs>
  <g font-family="Arial, sans-serif">
    <text x="40" y="44" fill="#f5f5f5" font-size="24" font-weight="700">PerspectiveCamera(fov, aspect, near, far)</text>
    <text x="40" y="72" fill="#a1a1aa" font-size="15">相机看到的是一个视锥体，只有 near 和 far 之间、视野角以内的物体会被渲染。</text>

    <g transform="translate(94 196)">
      <polygon points="0,28 48,0 48,56" fill="#334155" stroke="#cbd5e1" stroke-width="2"/>
      <rect x="-42" y="10" width="42" height="36" rx="4" fill="#475569" stroke="#cbd5e1" stroke-width="2"/>
      <text x="-54" y="88" fill="#f5f5f5" font-size="16" font-weight="700">camera.position</text>
    </g>

    <line x1="146" y1="224" x2="770" y2="104" stroke="#60a5fa" stroke-width="3"/>
    <line x1="146" y1="224" x2="770" y2="344" stroke="#60a5fa" stroke-width="3"/>
    <line x1="146" y1="224" x2="770" y2="224" stroke="#60a5fa" stroke-width="2" stroke-dasharray="8 8" marker-end="url(#cameraArrow)"/>

    <line x1="260" y1="202" x2="260" y2="246" stroke="#facc15" stroke-width="4"/>
    <text x="236" y="184" fill="#facc15" font-size="16" font-weight="700">near</text>
    <text x="208" y="268" fill="#d4d4d8" font-size="13">太近会被裁掉</text>

    <line x1="770" y1="104" x2="770" y2="344" stroke="#facc15" stroke-width="4"/>
    <text x="752" y="86" fill="#facc15" font-size="16" font-weight="700">far</text>
    <text x="716" y="372" fill="#d4d4d8" font-size="13">太远会被裁掉</text>

    <path d="M206 212 A80 80 0 0 1 206 236" fill="none" stroke="#fb7185" stroke-width="4"/>
    <text x="215" y="230" fill="#fb7185" font-size="16" font-weight="700">fov</text>
    <text x="190" y="292" fill="#d4d4d8" font-size="13">视野角越大，看到范围越广</text>

    <rect x="520" y="176" width="82" height="82" fill="#38bdf8" stroke="#e0f2fe" stroke-width="2"/>
    <text x="520" y="278" fill="#d4d4d8" font-size="14">视野内：会显示</text>

    <rect x="820" y="176" width="58" height="58" fill="#52525b" stroke="#a1a1aa" stroke-width="2" opacity="0.45"/>
    <text x="790" y="258" fill="#a1a1aa" font-size="14">far 外：不显示</text>

    <rect x="178" y="162" width="46" height="46" fill="#52525b" stroke="#a1a1aa" stroke-width="2" opacity="0.45"/>
    <text x="150" y="142" fill="#a1a1aa" font-size="14">near 内：不显示</text>

    <rect x="612" y="115" width="150" height="88" rx="6" fill="#202020" stroke="#3f3f46"/>
    <text x="628" y="145" fill="#f5f5f5" font-size="16" font-weight="700">aspect</text>
    <text x="628" y="170" fill="#d4d4d8" font-size="13">画面宽高比</text>
    <text x="628" y="190" fill="#d4d4d8" font-size="13">width / height</text>
  </g>
</svg>
