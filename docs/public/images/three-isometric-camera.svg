<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" role="img" aria-label="等距视角示意图">
  <rect width="820" height="320" rx="8" fill="#171717"/>
  <defs>
    <marker id="isoArrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#60a5fa"/>
    </marker>
  </defs>
  <g font-family="Arial, sans-serif">
    <text x="40" y="44" fill="#f5f5f5" font-size="24" font-weight="700">等距视角：OrthographicCamera + 固定角度</text>
    <text x="40" y="72" fill="#a1a1aa" font-size="15">没有近大远小，常用于策略游戏、地图、工程图。</text>
    <g transform="translate(330 120)">
      <polygon points="0,60 70,20 140,60 70,100" fill="#0f766e" stroke="#bfdbfe"/>
      <polygon points="0,60 0,128 70,172 70,100" fill="#2563eb" stroke="#bfdbfe"/>
      <polygon points="140,60 140,128 70,172 70,100" fill="#1d4ed8" stroke="#bfdbfe"/>
      <polygon points="26,42 70,16 114,42 70,68" fill="#38bdf8" opacity="0.9"/>
    </g>
    <polygon points="118,120 168,92 168,148" fill="#334155" stroke="#cbd5e1"/>
    <line x1="170" y1="120" x2="320" y2="160" stroke="#60a5fa" stroke-width="3" marker-end="url(#isoArrow)"/>
    <line x1="170" y1="120" x2="320" y2="110" stroke="#60a5fa" stroke-width="3" marker-end="url(#isoArrow)" opacity="0.7"/>
    <line x1="170" y1="120" x2="320" y2="210" stroke="#60a5fa" stroke-width="3" marker-end="url(#isoArrow)" opacity="0.7"/>
    <text x="96" y="186" fill="#d4d4d8" font-size="14">固定斜上方观察</text>
    <text x="520" y="144" fill="#f5f5f5" font-size="17" font-weight="700">特点</text>
    <text x="520" y="174" fill="#d4d4d8" font-size="14">远近同大</text>
    <text x="520" y="198" fill="#d4d4d8" font-size="14">网格方向稳定</text>
    <text x="520" y="222" fill="#d4d4d8" font-size="14">适合地图和工程视图</text>
  </g>
</svg>
