  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" role="img" aria-label="CubeCamera 六方向采样示意图">
  <rect width="820" height="320" rx="8" fill="#171717"/>
  <defs>
    <marker id="cubeCamArrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#facc15"/>
    </marker>
  </defs>
  <g font-family="Arial, sans-serif">
    <text x="40" y="44" fill="#f5f5f5" font-size="24" font-weight="700">CubeCamera：向六个方向拍摄环境</text>
    <text x="40" y="72" fill="#a1a1aa" font-size="15">常用于生成环境贴图，让金属或镜面材质能反射周围场景。</text>
    <circle cx="250" cy="170" r="14" fill="#facc15"/>
    <line x1="250" y1="170" x2="250" y2="86" stroke="#facc15" stroke-width="4" marker-end="url(#cubeCamArrow)"/>
    <line x1="250" y1="170" x2="250" y2="254" stroke="#facc15" stroke-width="4" marker-end="url(#cubeCamArrow)"/>
    <line x1="250" y1="170" x2="334" y2="170" stroke="#facc15" stroke-width="4" marker-end="url(#cubeCamArrow)"/>
    <line x1="250" y1="170" x2="166" y2="170" stroke="#facc15" stroke-width="4" marker-end="url(#cubeCamArrow)"/>
    <line x1="250" y1="170" x2="310" y2="110" stroke="#facc15" stroke-width="4" marker-end="url(#cubeCamArrow)"/>
    <line x1="250" y1="170" x2="190" y2="230" stroke="#facc15" stroke-width="4" marker-end="url(#cubeCamArrow)"/>
    <text x="226" y="302" fill="#d4d4d8" font-size="14">一个点，六个方向</text>
    <g transform="translate(500 102)">
      <rect x="0" y="40" width="70" height="70" fill="#1d4ed8" stroke="#bfdbfe"/>
      <rect x="70" y="40" width="70" height="70" fill="#2563eb" stroke="#bfdbfe"/>
      <rect x="140" y="40" width="70" height="70" fill="#0f766e" stroke="#bfdbfe"/>
      <rect x="70" y="-30" width="70" height="70" fill="#38bdf8" stroke="#bfdbfe"/>
      <rect x="70" y="110" width="70" height="70" fill="#334155" stroke="#bfdbfe"/>
      <rect x="210" y="40" width="70" height="70" fill="#475569" stroke="#bfdbfe"/>
      <text x="118" y="212" text-anchor="middle" fill="#d4d4d8" font-size="14">六张图组成环境贴图</text>
    </g>
  </g>
</svg>
