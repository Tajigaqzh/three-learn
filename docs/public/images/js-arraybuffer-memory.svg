<svg xmlns="http://www.w3.org/2000/svg" width="920" height="300" viewBox="0 0 920 300" role="img" aria-labelledby="title desc">
  <title id="title">ArrayBuffer memory</title>
  <desc id="desc">A diagram showing ArrayBuffer as a contiguous sequence of bytes.</desc>
  <rect width="920" height="300" fill="#f8fafc"/>
  <text x="40" y="44" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">ArrayBuffer：一整块原始内存</text>
  <text x="40" y="78" font-family="Arial, sans-serif" font-size="15" fill="#334155">它不关心里面是整数、浮点数、颜色还是文件内容，只是一排字节。</text>
  <g transform="translate(52,130)">
    <rect x="0" y="0" width="816" height="72" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <g font-family="Arial, sans-serif" font-size="13" text-anchor="middle">
      <rect x="14" y="18" width="74" height="36" fill="#eff6ff" stroke="#60a5fa"/>
      <text x="51" y="41" fill="#1e3a8a">byte 0</text>
      <rect x="88" y="18" width="74" height="36" fill="#eff6ff" stroke="#60a5fa"/>
      <text x="125" y="41" fill="#1e3a8a">byte 1</text>
      <rect x="162" y="18" width="74" height="36" fill="#eff6ff" stroke="#60a5fa"/>
      <text x="199" y="41" fill="#1e3a8a">byte 2</text>
      <rect x="236" y="18" width="74" height="36" fill="#eff6ff" stroke="#60a5fa"/>
      <text x="273" y="41" fill="#1e3a8a">byte 3</text>
      <rect x="310" y="18" width="74" height="36" fill="#eff6ff" stroke="#60a5fa"/>
      <text x="347" y="41" fill="#1e3a8a">byte 4</text>
      <rect x="384" y="18" width="74" height="36" fill="#eff6ff" stroke="#60a5fa"/>
      <text x="421" y="41" fill="#1e3a8a">byte 5</text>
      <rect x="458" y="18" width="74" height="36" fill="#eff6ff" stroke="#60a5fa"/>
      <text x="495" y="41" fill="#1e3a8a">byte 6</text>
      <rect x="532" y="18" width="74" height="36" fill="#eff6ff" stroke="#60a5fa"/>
      <text x="569" y="41" fill="#1e3a8a">byte 7</text>
      <text x="690" y="41" fill="#1e3a8a">...</text>
    </g>
  </g>
  <text x="52" y="236" font-family="Arial, sans-serif" font-size="15" fill="#334155">创建方式：new ArrayBuffer(8) 表示申请 8 个字节。</text>
</svg>
