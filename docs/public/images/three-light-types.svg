<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 280" role="img" aria-label="常见 Three.js 光源类型示意图">
  <rect width="920" height="280" rx="8" fill="#171717"/>
  <defs>
    <marker id="lightArrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#facc15"/>
    </marker>
    <radialGradient id="pointGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#facc15" stop-opacity="0.75"/>
      <stop offset="70%" stop-color="#facc15" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#facc15" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="spotGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#facc15" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#facc15" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <g font-family="Arial, sans-serif" transform="translate(24 24)">
    <rect x="0" y="0" width="196" height="232" rx="8" fill="#202020" stroke="#3f3f46"/>
    <text x="20" y="34" fill="#f5f5f5" font-size="18" font-weight="700">AmbientLight</text>
    <text x="20" y="58" fill="#a1a1aa" font-size="13">环境光：均匀补亮</text>
    <circle cx="98" cy="126" r="66" fill="#facc15" opacity="0.12"/>
    <circle cx="98" cy="126" r="42" fill="#facc15" opacity="0.12"/>
    <rect x="78" y="106" width="40" height="40" fill="#38bdf8" stroke="#e0f2fe"/>
    <path d="M68 176 H128" stroke="#71717a" stroke-width="3"/>
    <text x="20" y="210" fill="#d4d4d8" font-size="13">无方向，不投射阴影</text>
  </g>

  <g font-family="Arial, sans-serif" transform="translate(252 24)">
    <rect x="0" y="0" width="196" height="232" rx="8" fill="#202020" stroke="#3f3f46"/>
    <text x="20" y="34" fill="#f5f5f5" font-size="18" font-weight="700">DirectionalLight</text>
    <text x="20" y="58" fill="#a1a1aa" font-size="13">方向光：类似太阳</text>
    <line x1="52" y1="80" x2="126" y2="154" stroke="#facc15" stroke-width="4" marker-end="url(#lightArrow)"/>
    <line x1="86" y1="76" x2="160" y2="150" stroke="#facc15" stroke-width="4" marker-end="url(#lightArrow)"/>
    <rect x="80" y="126" width="42" height="42" fill="#38bdf8" stroke="#e0f2fe"/>
    <ellipse cx="128" cy="184" rx="46" ry="9" fill="#0f172a" opacity="0.72"/>
    <path d="M52 184 H164" stroke="#71717a" stroke-width="3"/>
    <text x="20" y="210" fill="#d4d4d8" font-size="13">有方向，可投射阴影</text>
  </g>

  <g font-family="Arial, sans-serif" transform="translate(480 24)">
    <rect x="0" y="0" width="196" height="232" rx="8" fill="#202020" stroke="#3f3f46"/>
    <text x="20" y="34" fill="#f5f5f5" font-size="18" font-weight="700">PointLight</text>
    <text x="20" y="58" fill="#a1a1aa" font-size="13">点光源：向四周发散</text>
    <circle cx="98" cy="112" r="72" fill="url(#pointGlow)"/>
    <circle cx="98" cy="112" r="10" fill="#facc15"/>
    <line x1="98" y1="112" x2="98" y2="48" stroke="#facc15" stroke-width="3" marker-end="url(#lightArrow)"/>
    <line x1="98" y1="112" x2="154" y2="112" stroke="#facc15" stroke-width="3" marker-end="url(#lightArrow)"/>
    <line x1="98" y1="112" x2="52" y2="156" stroke="#facc15" stroke-width="3" marker-end="url(#lightArrow)"/>
    <rect x="96" y="152" width="36" height="36" fill="#38bdf8" stroke="#e0f2fe"/>
    <text x="20" y="210" fill="#d4d4d8" font-size="13">像灯泡，距离影响亮度</text>
  </g>

  <g font-family="Arial, sans-serif" transform="translate(708 24)">
    <rect x="0" y="0" width="188" height="232" rx="8" fill="#202020" stroke="#3f3f46"/>
    <text x="20" y="34" fill="#f5f5f5" font-size="18" font-weight="700">SpotLight</text>
    <text x="20" y="58" fill="#a1a1aa" font-size="13">聚光灯：锥形范围</text>
    <path d="M72 76 L142 180 L34 180 Z" fill="url(#spotGlow)" stroke="#facc15" stroke-opacity="0.55"/>
    <circle cx="72" cy="76" r="9" fill="#facc15"/>
    <line x1="72" y1="76" x2="88" y2="152" stroke="#facc15" stroke-width="3" marker-end="url(#lightArrow)"/>
    <rect x="72" y="150" width="36" height="36" fill="#38bdf8" stroke="#e0f2fe"/>
    <path d="M34 184 H142" stroke="#71717a" stroke-width="3"/>
    <text x="20" y="210" fill="#d4d4d8" font-size="13">像手电筒，可投射阴影</text>
  </g>
</svg>
