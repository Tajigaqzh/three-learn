<svg xmlns="http://www.w3.org/2000/svg" width="920" height="330" viewBox="0 0 920 330" role="img" aria-labelledby="title desc">
  <title id="title">Shared memory and WebAssembly memory</title>
  <desc id="desc">A diagram showing SharedArrayBuffer shared by main thread and worker, and WebAssembly.Memory viewed by TypedArray.</desc>
  <rect width="920" height="330" fill="#f8fafc"/>
  <text x="40" y="44" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">SharedArrayBuffer / WebAssembly.Memory：高级共享内存</text>
  <g transform="translate(54,104)" font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="0" y="28" width="152" height="72" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="76" y="60" font-size="18" font-weight="700" fill="#991b1b">Main Thread</text>
    <text x="76" y="82" font-size="13" fill="#991b1b">UI / 调度</text>
    <rect x="252" y="28" width="190" height="72" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="347" y="60" font-size="18" font-weight="700" fill="#1e3a8a">SharedArrayBuffer</text>
    <text x="347" y="82" font-size="13" fill="#1e40af">线程间共享字节</text>
    <rect x="542" y="28" width="152" height="72" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="618" y="60" font-size="18" font-weight="700" fill="#166534">Worker</text>
    <text x="618" y="82" font-size="13" fill="#166534">后台计算</text>
    <path d="M152 64 H252" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M542 64 H442" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="252" y="154" width="190" height="72" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="347" y="186" font-size="18" font-weight="700" fill="#92400e">WebAssembly.Memory</text>
    <text x="347" y="208" font-size="13" fill="#92400e">WASM 线性内存</text>
    <rect x="542" y="154" width="152" height="72" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="618" y="186" font-size="18" font-weight="700" fill="#5b21b6">TypedArray</text>
    <text x="618" y="208" font-size="13" fill="#5b21b6">JS 侧读写视图</text>
    <path d="M442 190 H542" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <text x="54" y="294" font-family="Arial, sans-serif" font-size="15" fill="#334155">注意：SharedArrayBuffer 需要跨源隔离；Atomics 用来做线程同步。</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
