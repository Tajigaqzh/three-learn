<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">Float32Array vertex buffer</title>
  <desc id="desc">A diagram showing a Float32Array storing XYZ vertex positions and Uint16Array storing triangle indices for WebGL.</desc>
  <rect width="920" height="360" fill="#f8fafc"/>
  <text x="40" y="44" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Float32Array / Uint16Array：3D 顶点和索引</text>
  <g transform="translate(72,92)">
    <circle cx="70" cy="176" r="8" fill="#2563eb"/>
    <circle cx="210" cy="176" r="8" fill="#2563eb"/>
    <circle cx="140" cy="46" r="8" fill="#2563eb"/>
    <path d="M70 176 L210 176 L140 46 Z" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="56" y="202" font-family="Arial, sans-serif" font-size="13" fill="#1e3a8a">v0</text>
    <text x="214" y="202" font-family="Arial, sans-serif" font-size="13" fill="#1e3a8a">v1</text>
    <text x="144" y="38" font-family="Arial, sans-serif" font-size="13" fill="#1e3a8a">v2</text>
  </g>
  <path d="M326 176 H392" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <g transform="translate(420,92)" font-family="Arial, sans-serif" text-anchor="middle">
    <text x="186" y="20" font-size="16" font-weight="700" fill="#92400e">positions: Float32Array</text>
    <rect x="0" y="42" width="124" height="44" fill="#fef3c7" stroke="#d97706"/>
    <text x="62" y="70" font-size="13" fill="#92400e">v0: x y z</text>
    <rect x="124" y="42" width="124" height="44" fill="#fef3c7" stroke="#d97706"/>
    <text x="186" y="70" font-size="13" fill="#92400e">v1: x y z</text>
    <rect x="248" y="42" width="124" height="44" fill="#fef3c7" stroke="#d97706"/>
    <text x="310" y="70" font-size="13" fill="#92400e">v2: x y z</text>
    <text x="186" y="124" font-size="15" fill="#334155">每 3 个 float 表示一个顶点坐标</text>
    <text x="186" y="180" font-size="16" font-weight="700" fill="#166534">index: Uint16Array / Uint32Array</text>
    <rect x="96" y="202" width="60" height="42" fill="#dcfce7" stroke="#16a34a"/>
    <text x="126" y="228" font-size="13" fill="#166534">0</text>
    <rect x="156" y="202" width="60" height="42" fill="#dcfce7" stroke="#16a34a"/>
    <text x="186" y="228" font-size="13" fill="#166534">1</text>
    <rect x="216" y="202" width="60" height="42" fill="#dcfce7" stroke="#16a34a"/>
    <text x="246" y="228" font-size="13" fill="#166534">2</text>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
