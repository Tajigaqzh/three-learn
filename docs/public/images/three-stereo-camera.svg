<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" role="img" aria-label="StereoCamera 左右眼示意图">
  <rect width="820" height="300" rx="8" fill="#171717"/>
  <defs>
    <marker id="stereoArrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#60a5fa"/>
    </marker>
  </defs>
  <g font-family="Arial, sans-serif">
    <text x="40" y="44" fill="#f5f5f5" font-size="24" font-weight="700">StereoCamera：左右眼双视角</text>
    <text x="40" y="72" fill="#a1a1aa" font-size="15">基于主相机拆出左眼和右眼视角，用于立体视觉或 VR 类效果。</text>
    <circle cx="170" cy="158" r="24" fill="#3b82f6" stroke="#bfdbfe"/>
    <circle cx="238" cy="158" r="24" fill="#ef4444" stroke="#fecaca"/>
    <text x="170" y="206" text-anchor="middle" fill="#bfdbfe" font-size="14">Left</text>
    <text x="238" y="206" text-anchor="middle" fill="#fecaca" font-size="14">Right</text>
    <line x1="170" y1="158" x2="530" y2="112" stroke="#3b82f6" stroke-width="3" marker-end="url(#stereoArrow)"/>
    <line x1="238" y1="158" x2="530" y2="204" stroke="#ef4444" stroke-width="3" marker-end="url(#stereoArrow)"/>
    <rect x="530" y="92" width="190" height="132" rx="8" fill="#202020" stroke="#52525b"/>
    <line x1="625" y1="92" x2="625" y2="224" stroke="#52525b"/>
    <text x="578" y="160" text-anchor="middle" fill="#bfdbfe" font-size="18" font-weight="700">左眼画面</text>
    <text x="674" y="160" text-anchor="middle" fill="#fecaca" font-size="18" font-weight="700">右眼画面</text>
  </g>
</svg>
