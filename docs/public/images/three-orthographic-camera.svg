<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" role="img" aria-label="OrthographicCamera 原理图">
  <rect width="920" height="420" rx="8" fill="#171717"/>
  <defs>
    <marker id="orthoArrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#60a5fa"/>
    </marker>
  </defs>
  <g font-family="Arial, sans-serif">
    <text x="40" y="44" fill="#f5f5f5" font-size="24" font-weight="700">OrthographicCamera：平行投影盒子</text>
    <text x="40" y="72" fill="#a1a1aa" font-size="15">正交相机没有近大远小。left/right/top/bottom 决定可见盒子的宽高，near/far 决定前后裁剪范围。</text>

    <g transform="translate(90 120)">
      <polygon points="0,40 70,0 70,220 0,260" fill="#334155" stroke="#cbd5e1" stroke-width="2"/>
      <rect x="-46" y="112" width="46" height="36" rx="4" fill="#475569" stroke="#cbd5e1" stroke-width="2"/>
      <text x="-48" y="296" fill="#f5f5f5" font-size="16" font-weight="700">camera.position</text>
    </g>

    <g opacity="0.28">
      <polygon points="250,100 700,100 790,150 340,150" fill="#1d4ed8" stroke="#60a5fa" stroke-width="2"/>
      <polygon points="250,300 700,300 790,350 340,350" fill="#1d4ed8" stroke="#60a5fa" stroke-width="2"/>
      <polygon points="250,100 340,150 340,350 250,300" fill="#1d4ed8" stroke="#60a5fa" stroke-width="2"/>
      <polygon points="700,100 790,150 790,350 700,300" fill="#1d4ed8" stroke="#60a5fa" stroke-width="2"/>
    </g>

    <line x1="170" y1="160" x2="750" y2="160" stroke="#60a5fa" stroke-width="3" marker-end="url(#orthoArrow)"/>
    <line x1="170" y1="210" x2="750" y2="210" stroke="#60a5fa" stroke-width="3" marker-end="url(#orthoArrow)"/>
    <line x1="170" y1="260" x2="750" y2="260" stroke="#60a5fa" stroke-width="3" marker-end="url(#orthoArrow)"/>

    <line x1="250" y1="92" x2="250" y2="310" stroke="#facc15" stroke-width="4"/>
    <text x="222" y="86" fill="#facc15" font-size="16" font-weight="700">near</text>

    <line x1="700" y1="92" x2="700" y2="310" stroke="#facc15" stroke-width="4"/>
    <text x="684" y="86" fill="#facc15" font-size="16" font-weight="700">far</text>

    <line x1="340" y1="150" x2="790" y2="150" stroke="#fb7185" stroke-width="3"/>
    <text x="798" y="154" fill="#fb7185" font-size="15" font-weight="700">top</text>

    <line x1="340" y1="350" x2="790" y2="350" stroke="#fb7185" stroke-width="3"/>
    <text x="798" y="354" fill="#fb7185" font-size="15" font-weight="700">bottom</text>

    <line x1="340" y1="150" x2="340" y2="350" stroke="#22c55e" stroke-width="3"/>
    <text x="306" y="252" fill="#22c55e" font-size="15" font-weight="700">left</text>

    <line x1="790" y1="150" x2="790" y2="350" stroke="#22c55e" stroke-width="3"/>
    <text x="802" y="252" fill="#22c55e" font-size="15" font-weight="700">right</text>

    <rect x="420" y="205" width="44" height="44" fill="#38bdf8" stroke="#e0f2fe" stroke-width="2"/>
    <rect x="590" y="205" width="44" height="44" fill="#38bdf8" stroke="#e0f2fe" stroke-width="2" opacity="0.75"/>
    <text x="410" y="282" fill="#d4d4d8" font-size="14">远近相同尺寸的物体</text>
    <text x="410" y="304" fill="#d4d4d8" font-size="14">在正交相机中显示大小一致</text>
  </g>
</svg>
