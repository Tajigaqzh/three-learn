<svg xmlns="http://www.w3.org/2000/svg" width="920" height="330" viewBox="0 0 920 330" role="img" aria-labelledby="title desc">
  <title id="title">Blob File Stream to ArrayBuffer</title>
  <desc id="desc">A diagram showing File, Blob and ReadableStream converting into ArrayBuffer and TypedArray views.</desc>
  <rect width="920" height="330" fill="#f8fafc"/>
  <text x="40" y="44" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Blob / File / Stream：二进制数据从哪里来</text>
  <g transform="translate(62,104)" font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="0" y="0" width="150" height="72" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="75" y="32" font-size="18" font-weight="700" fill="#991b1b">File</text>
    <text x="75" y="54" font-size="13" fill="#991b1b">用户选择的文件</text>
    <rect x="0" y="116" width="150" height="72" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="75" y="148" font-size="18" font-weight="700" fill="#92400e">Blob</text>
    <text x="75" y="170" font-size="13" fill="#92400e">一段二进制对象</text>
    <rect x="248" y="58" width="180" height="72" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="338" y="90" font-size="18" font-weight="700" fill="#075985">ReadableStream</text>
    <text x="338" y="112" font-size="13" fill="#075985">分块读取</text>
    <rect x="526" y="58" width="160" height="72" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="606" y="90" font-size="18" font-weight="700" fill="#1e3a8a">ArrayBuffer</text>
    <text x="606" y="112" font-size="13" fill="#1e40af">完整内存块</text>
    <rect x="746" y="58" width="126" height="72" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="809" y="90" font-size="18" font-weight="700" fill="#166534">Uint8Array</text>
    <text x="809" y="112" font-size="13" fill="#166534">逐字节处理</text>
    <path d="M150 36 H248" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M150 152 C200 152 204 94 248 94" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M428 94 H526" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M686 94 H746" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <text x="62" y="292" font-family="Arial, sans-serif" font-size="15" fill="#334155">典型流程：fetch / input file 得到 Blob 或 Stream，再转成 ArrayBuffer，最后用 TypedArray 读取。</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
