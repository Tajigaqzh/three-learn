<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">Service Worker lifecycle and cache flow</title>
  <desc id="desc">A diagram showing registration, install, activate, fetch interception, cache lookup, network fallback, and cache update for Service Worker.</desc>
  <rect width="980" height="420" fill="#f8fafc"/>
  <text x="40" y="44" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#0f172a">Service Worker 的注册和缓存流程</text>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="48" y="96" width="140" height="72" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="118" y="126" font-size="18" font-weight="700" fill="#991b1b">页面注册</text>
    <text x="118" y="148" font-size="13" fill="#991b1b">navigator.serviceWorker.register()</text>

    <rect x="244" y="96" width="140" height="72" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="314" y="126" font-size="18" font-weight="700" fill="#1e3a8a">install</text>
    <text x="314" y="148" font-size="13" fill="#1e40af">预缓存静态资源</text>

    <rect x="440" y="96" width="140" height="72" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="510" y="126" font-size="18" font-weight="700" fill="#166534">activate</text>
    <text x="510" y="148" font-size="13" fill="#166534">清理旧缓存 / 接管页面</text>

    <rect x="636" y="96" width="140" height="72" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="706" y="126" font-size="18" font-weight="700" fill="#92400e">fetch</text>
    <text x="706" y="148" font-size="13" fill="#92400e">拦截请求</text>

    <rect x="832" y="48" width="110" height="64" rx="8" fill="#f8fafc" stroke="#94a3b8"/>
    <text x="887" y="76" font-size="16" font-weight="700" fill="#0f172a">Cache</text>
    <text x="887" y="96" font-size="12" fill="#334155">caches.match()</text>

    <rect x="832" y="166" width="110" height="64" rx="8" fill="#f8fafc" stroke="#94a3b8"/>
    <text x="887" y="194" font-size="16" font-weight="700" fill="#0f172a">Network</text>
    <text x="887" y="214" font-size="12" fill="#334155">fetch(request)</text>

    <path d="M188 132 H244" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M384 132 H440" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M580 132 H636" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M776 120 C814 120 816 82 832 80" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M776 140 C814 140 816 198 832 198" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <rect x="76" y="244" width="828" height="112" rx="8" fill="#fff" stroke="#cbd5e1"/>
  <text x="96" y="276" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">常见策略：Cache First + Network Fallback</text>
  <text x="96" y="304" font-family="Arial, sans-serif" font-size="14" fill="#334155">先查缓存，命中就直接返回；没命中再走网络；网络返回后把副本放进缓存。</text>
  <text x="96" y="330" font-family="Arial, sans-serif" font-size="14" fill="#334155">更新版本时，在 activate 阶段删除旧缓存，避免资源版本混乱。</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
